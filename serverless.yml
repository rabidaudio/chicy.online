org: rabidaudio
app: static-chic
service: static-chic

stages:
  default:
    params:
      # A hosted zone for param:baseDomain.
      # Because the same hostedzone is used for all envrionments,
      # it has to be created outside of this CF template and it's
      # ID needs to be put here.
      hostedZoneId: Z0815807GYU44VR2QYOU
      baseDomain: static-chic.online
      tablePrefix: "${self:org}-${self:app}-${sls:stage}"
      apiDomain: api.${sls:stage}.${param:baseDomain}
      sitesDomain: sites.${sls:stage}.${param:baseDomain}
  prod:
    params:
      apiDomain: api.${param:baseDomain}
      sitesDomain: sites.${param:baseDomain}

provider:
  name: aws
  runtime: nodejs22.x
  domain: ${param:apiDomain}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - Fn::GetAtt: [UsersTable, Arn]
            - Fn::GetAtt: [SitesTable, Arn]
            - Fn::GetAtt: [DeploymentsTable, Arn]
        - Effect: Allow
          Action:
            - s3:GetObjectAcl
            - s3:GetObject
            - s3:GetObjectAttributes
            - s3:GetObjectVersionAcl
            - s3:GetObjectTagging
            - s3:PutObject
            - s3:DeleteObject
            - s3:GetBucketAcl
            - s3:AbortMultipartUpload
            - s3:ListBucket
          Resource:
            - Fn::GetAtt: [DeploymentBucket, Arn]
            - Fn::Join:
              - ''
              - - Fn::GetAtt: [DeploymentBucket, Arn]
                - '/*'
  environment:
    TABLE_PREFIX: ${param:tablePrefix}
    NODE_ENV: ${sls:stage}
    HOSTNAME: ${param:apiDomain}

functions:
  api:
    handler: handler.handler
    events:
      - httpApi: "*"

resources:
  Resources:
    DeploymentBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Retain
      Properties:
        BucketName: ${param:tablePrefix}
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        TableName: ${param:tablePrefix}-users
    SitesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        AttributeDefinitions:
          - AttributeName: siteId
            AttributeType: S
        KeySchema:
          - AttributeName: siteId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        TableName: ${param:tablePrefix}-sites
    DeploymentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        AttributeDefinitions:
          - AttributeName: siteId
            AttributeType: S
          - AttributeName: deploymentId
            AttributeType: S
        KeySchema:
          - AttributeName: siteId
            KeyType: HASH
          - AttributeName: deploymentId
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST
        TableName: ${param:tablePrefix}-deployments
    SiteDomain:
      Type: AWS::Route53::RecordSet
      Properties: 
        HostedZoneId: ${param:hostedZoneId}
        Name: ${param:sitesDomain}
        Type: CNAME
        TTL: "300"
        ResourceRecords:
          - "example.com" # TODO
          # - Fn::GetAtt: [CloudfrontDistro, Arn]
    SiteCertificate:
      Type: AWS::CertificateManager::Certificate
      Properties:
        DomainName: ${param:sitesDomain}
        SubjectAlternativeNames:
          - "*.${param:sitesDomain}"
        ValidationMethod: DNS
        DomainValidationOptions:
          - DomainName: ${param:sitesDomain}
            HostedZoneId: ${param:hostedZoneId}
